name: Deploy Backend to Production

on:
  push:
    branches: [main]
    paths:
      - 'moi-order-backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: SSH deploy → DigitalOcean
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key
          ssh-keyscan -H 157.230.34.59 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key root@157.230.34.59 bash << 'ENDSSH'
            set -e
            cd /var/www/moi-order
            git pull origin main
            cd moi-order-backend
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan config:cache
            php artisan route:clear
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            php artisan queue:restart
            supervisorctl restart "moi-order-worker:*"
            echo "Deploy complete: $(date)"
          ENDSSH
