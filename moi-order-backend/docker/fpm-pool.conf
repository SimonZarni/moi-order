[www]
; Forward PHP worker stdout/stderr to the container's stdout/stderr
; so Laravel's LOG_CHANNEL=stderr logs appear in Railway deploy logs.
catch_workers_output = yes
decorate_workers_output = no

; Ensure upload limits match php.ini — FPM pool values take precedence over php.ini.
php_admin_value[upload_max_filesize] = 50M
php_admin_value[post_max_size]       = 60M
php_admin_value[memory_limit]        = 256M
php_admin_value[max_execution_time]  = 60
