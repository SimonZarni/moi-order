# ─────────────────────────────────────────────────────────────
# Nginx Configuration for Laravel + PHP-FPM on Railway
# ─────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    # ================== TEMPORARY DIRECTORIES (CRITICAL FIX) ==================
    client_body_temp_path /tmp/client_body 1 2;
    proxy_temp_path       /tmp/proxy 1 2;
    fastcgi_temp_path     /tmp/fastcgi 1 2;

    # Maximum upload size (important for file submissions)
    client_max_body_size 100m;

    # General settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Logging
    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    # MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ================== SERVER BLOCK ==================
    server {
        listen ${PORT:-8080} default_server;
        listen [::]:${PORT:-8080} default_server;
        server_name _;

        root /var/www/html/public;
        index index.php;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Handle real IP from Railway
        real_ip_header X-Forwarded-For;
        set_real_ip_from 0.0.0.0/0;

        # Laravel public files
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP-FPM handling
        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;

            # Standard Laravel fastcgi params
            include fastcgi_params;
            fastcgi_param QUERY_STRING $query_string;
            fastcgi_param REQUEST_METHOD $request_method;
            fastcgi_param CONTENT_TYPE $content_type;
            fastcgi_param CONTENT_LENGTH $content_length;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_param DOCUMENT_URI $document_uri;
            fastcgi_param DOCUMENT_ROOT $document_root;
            fastcgi_param SERVER_PROTOCOL $server_protocol;
            fastcgi_param REQUEST_SCHEME $scheme;
            fastcgi_param HTTPS $https if_not_empty;
            fastcgi_param REMOTE_ADDR $remote_addr;
            fastcgi_param REMOTE_PORT $remote_port;
            fastcgi_param SERVER_PORT $server_port;
            fastcgi_param SERVER_NAME $server_name;

            # Increase timeouts for larger uploads
            fastcgi_read_timeout 300;
            fastcgi_send_timeout 300;
            fastcgi_connect_timeout 60;
        }

        # Deny access to sensitive files
        location ~ /\.env {
            deny all;
            return 404;
        }
        location ~ /\.ht {
            deny all;
            return 404;
        }

        # Storage protection
        location ~ ^/storage/private/ {
            deny all;
            return 403;
        }
    }
}
